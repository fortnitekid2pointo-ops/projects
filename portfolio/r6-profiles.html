<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>R6 SIEGE — OPERATOR PROFILES</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #c8a951;
    --orange: #e8700a;
    --red: #c0392b;
    --dark: #0a0c0e;
    --darker: #060709;
    --panel: #0f1215;
    --panel2: #131820;
    --border: #1e2830;
    --border2: #2a3540;
    --text: #d4dde6;
    --muted: #6a7d8e;
    --cyan: #4ab3c8;
    --green: #3abf7e;
    --diamond: #5bb8f5;
    --platinum: #c0c8d4;
    --gold-rank: #e8b84b;
    --silver: #a8b8c8;
    --bronze: #b07040;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--darker);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* BG texture */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(255,255,255,0.015) 40px),
      repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(255,255,255,0.015) 40px);
    pointer-events: none;
    z-index: 0;
  }

  /* HEADER */
  header {
    position: relative;
    background: linear-gradient(180deg, #0d1318 0%, var(--darker) 100%);
    border-bottom: 1px solid var(--border2);
    padding: 0 40px;
    z-index: 10;
  }

  .header-inner {
    display: flex;
    align-items: center;
    gap: 24px;
    padding: 22px 0 18px;
    border-bottom: 2px solid var(--orange);
  }

  .siege-logo {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo-hex {
    width: 48px;
    height: 48px;
    position: relative;
  }

  .logo-hex svg { width: 100%; height: 100%; }

  .logo-text {
    line-height: 1;
  }

  .logo-text .r6 {
    font-family: 'Orbitron', monospace;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 6px;
    color: var(--orange);
    text-transform: uppercase;
  }

  .logo-text .siege {
    font-family: 'Orbitron', monospace;
    font-size: 22px;
    font-weight: 900;
    color: #fff;
    letter-spacing: 2px;
  }

  .header-divider {
    width: 1px;
    height: 40px;
    background: var(--border2);
  }

  .header-title {
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    color: var(--muted);
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  .header-stats {
    margin-left: auto;
    display: flex;
    gap: 32px;
    align-items: center;
  }

  .stat-pill {
    text-align: right;
  }

  .stat-pill .label {
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
  }

  .stat-pill .value {
    font-family: 'Orbitron', monospace;
    font-size: 16px;
    color: var(--gold);
    font-weight: 700;
  }

  .scanner-line {
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--orange), transparent);
    animation: scan 3s ease-in-out infinite;
  }

  @keyframes scan {
    0%, 100% { opacity: 0.3; transform: scaleX(0.3); }
    50% { opacity: 1; transform: scaleX(1); }
  }

  /* MAIN */
  main {
    position: relative;
    z-index: 1;
    padding: 40px;
    max-width: 1400px;
    margin: 0 auto;
  }

  .section-header {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 28px;
  }

  .section-tag {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: var(--orange);
    letter-spacing: 4px;
    padding: 4px 12px;
    border: 1px solid var(--orange);
    clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
    background: rgba(232, 112, 10, 0.08);
  }

  .section-line {
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, var(--border2), transparent);
  }

  .section-count {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 2px;
  }

  /* PROFILE GRID */
  .profiles-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
    gap: 2px;
  }

  .profile-card {
    background: var(--panel);
    border: 1px solid var(--border);
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: all 0.2s ease;
    clip-path: polygon(0 0, calc(100% - 20px) 0, 100% 20px, 100% 100%, 20px 100%, 0 calc(100% - 20px));
  }

  .profile-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(232,112,10,0.04) 0%, transparent 60%);
    opacity: 0;
    transition: opacity 0.2s;
  }

  .profile-card:hover {
    border-color: var(--orange);
    transform: translateY(-2px);
    box-shadow: 0 8px 32px rgba(232,112,10,0.15), inset 0 0 40px rgba(232,112,10,0.03);
  }

  .profile-card:hover::before { opacity: 1; }

  .card-corner {
    position: absolute;
    top: 0; right: 0;
    width: 20px; height: 20px;
    border-top: 2px solid var(--orange);
    border-right: 2px solid var(--orange);
    opacity: 0;
    transition: opacity 0.2s;
  }

  .profile-card:hover .card-corner { opacity: 1; }

  .card-inner {
    padding: 20px;
    display: flex;
    gap: 16px;
    align-items: flex-start;
  }

  /* Avatar */
  .avatar-wrap {
    position: relative;
    flex-shrink: 0;
  }

  .avatar {
    width: 72px;
    height: 72px;
    border: 2px solid var(--border2);
    clip-path: polygon(12px 0%, 100% 0%, 100% calc(100% - 12px), calc(100% - 12px) 100%, 0% 100%, 0% 12px);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 32px;
    position: relative;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .profile-card:hover .avatar {
    border-color: var(--orange);
  }

  .avatar-bg {
    position: absolute;
    inset: 0;
    opacity: 0.15;
  }

  .avatar-emoji {
    position: relative;
    z-index: 1;
    filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
  }

  .rank-badge {
    position: absolute;
    bottom: -4px;
    right: -4px;
    width: 24px;
    height: 24px;
    border-radius: 50%;
    border: 2px solid var(--dark);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 700;
    font-family: 'Orbitron', monospace;
  }

  /* Info */
  .card-info { flex: 1; min-width: 0; }

  .card-username {
    font-family: 'Orbitron', monospace;
    font-size: 14px;
    font-weight: 700;
    color: #fff;
    letter-spacing: 1px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 4px;
  }

  .card-uid {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 1px;
    margin-bottom: 10px;
  }

  .card-tags {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 10px;
  }

  .tag {
    font-size: 9px;
    font-family: 'Share Tech Mono', monospace;
    letter-spacing: 1.5px;
    padding: 2px 8px;
    border: 1px solid;
    text-transform: uppercase;
  }

  .tag-platform { color: var(--cyan); border-color: rgba(74,179,200,0.3); background: rgba(74,179,200,0.05); }
  .tag-region { color: var(--muted); border-color: var(--border2); }
  .tag-status-online { color: var(--green); border-color: rgba(58,191,126,0.3); background: rgba(58,191,126,0.05); }
  .tag-status-offline { color: var(--muted); border-color: var(--border); }

  .card-metrics {
    display: flex;
    gap: 16px;
  }

  .metric { }

  .metric .m-label {
    font-size: 9px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 2px;
  }

  .metric .m-val {
    font-family: 'Orbitron', monospace;
    font-size: 13px;
    font-weight: 700;
  }

  /* Value bar at bottom */
  .card-value-bar {
    padding: 10px 20px 14px;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .value-label {
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--muted);
    text-transform: uppercase;
    font-family: 'Share Tech Mono', monospace;
  }

  .value-amount {
    font-family: 'Orbitron', monospace;
    font-size: 18px;
    font-weight: 900;
    color: var(--gold);
    letter-spacing: 1px;
  }

  .value-items {
    font-size: 10px;
    color: var(--muted);
    font-family: 'Share Tech Mono', monospace;
    letter-spacing: 1px;
  }

  /* ==== MODAL ==== */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s;
    backdrop-filter: blur(4px);
  }

  .modal-overlay.active {
    opacity: 1;
    pointer-events: all;
  }

  .modal {
    background: var(--panel);
    border: 1px solid var(--border2);
    width: 900px;
    max-width: calc(100vw - 40px);
    max-height: 90vh;
    overflow-y: auto;
    position: relative;
    clip-path: polygon(0 0, calc(100% - 32px) 0, 100% 32px, 100% 100%, 32px 100%, 0 calc(100% - 32px));
    transform: translateY(20px);
    transition: transform 0.25s;
    scrollbar-width: thin;
    scrollbar-color: var(--border2) transparent;
  }

  .modal-overlay.active .modal {
    transform: translateY(0);
  }

  .modal-header {
    display: flex;
    align-items: center;
    gap: 20px;
    padding: 24px 28px 20px;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(135deg, rgba(232,112,10,0.06) 0%, transparent 60%);
  }

  .modal-avatar {
    width: 80px;
    height: 80px;
    border: 2px solid var(--orange);
    clip-path: polygon(12px 0%, 100% 0%, 100% calc(100% - 12px), calc(100% - 12px) 100%, 0% 100%, 0% 12px);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 36px;
    position: relative;
    overflow: hidden;
    flex-shrink: 0;
  }

  .modal-avatar-bg {
    position: absolute;
    inset: 0;
    opacity: 0.2;
  }

  .modal-avatar-emoji { position: relative; z-index: 1; }

  .modal-title-block { flex: 1; }

  .modal-username {
    font-family: 'Orbitron', monospace;
    font-size: 22px;
    font-weight: 900;
    color: #fff;
    letter-spacing: 2px;
    margin-bottom: 4px;
  }

  .modal-uid {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 2px;
    margin-bottom: 10px;
  }

  .modal-tags { display: flex; gap: 8px; flex-wrap: wrap; }

  .modal-value-block {
    text-align: right;
  }

  .modal-value-label {
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--muted);
    text-transform: uppercase;
    font-family: 'Share Tech Mono', monospace;
    margin-bottom: 4px;
  }

  .modal-value-amt {
    font-family: 'Orbitron', monospace;
    font-size: 28px;
    font-weight: 900;
    color: var(--gold);
  }

  .close-btn {
    position: absolute;
    top: 16px; right: 20px;
    background: none;
    border: 1px solid var(--border2);
    color: var(--muted);
    font-size: 18px;
    cursor: pointer;
    width: 32px;
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    font-family: 'Share Tech Mono', monospace;
  }

  .close-btn:hover {
    border-color: var(--orange);
    color: var(--orange);
  }

  .modal-body { padding: 24px 28px; }

  /* STATS GRID */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 2px;
    margin-bottom: 24px;
  }

  .stat-box {
    background: var(--panel2);
    border: 1px solid var(--border);
    padding: 14px 16px;
    position: relative;
    overflow: hidden;
  }

  .stat-box::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 2px;
  }

  .stat-box-label {
    font-size: 9px;
    letter-spacing: 3px;
    color: var(--muted);
    text-transform: uppercase;
    font-family: 'Share Tech Mono', monospace;
    margin-bottom: 6px;
  }

  .stat-box-val {
    font-family: 'Orbitron', monospace;
    font-size: 20px;
    font-weight: 700;
    color: #fff;
  }

  .stat-box-sub {
    font-size: 10px;
    color: var(--muted);
    font-family: 'Share Tech Mono', monospace;
    margin-top: 2px;
  }

  /* SECTION DIVIDER */
  .modal-section-title {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    letter-spacing: 4px;
    color: var(--orange);
    text-transform: uppercase;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .modal-section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, var(--border2), transparent);
  }

  /* OPERATORS */
  .operators-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
    gap: 8px;
    margin-bottom: 24px;
  }

  .op-card {
    background: var(--panel2);
    border: 1px solid var(--border);
    padding: 12px 8px;
    text-align: center;
    transition: all 0.15s;
    cursor: default;
  }

  .op-card:hover {
    border-color: var(--border2);
    transform: translateY(-2px);
  }

  .op-icon { font-size: 24px; margin-bottom: 6px; }

  .op-name {
    font-family: 'Orbitron', monospace;
    font-size: 9px;
    color: var(--text);
    letter-spacing: 1px;
    margin-bottom: 4px;
  }

  .op-elite {
    font-size: 8px;
    font-family: 'Share Tech Mono', monospace;
    color: var(--gold);
    letter-spacing: 1px;
  }

  .op-base {
    font-size: 8px;
    font-family: 'Share Tech Mono', monospace;
    color: var(--muted);
    letter-spacing: 1px;
  }

  /* ITEMS / COSMETICS */
  .items-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 8px;
    margin-bottom: 24px;
  }

  .item-card {
    background: var(--panel2);
    border: 1px solid var(--border);
    padding: 14px;
    position: relative;
    overflow: hidden;
    transition: border-color 0.15s;
  }

  .item-card:hover { border-color: var(--border2); }

  .item-rarity-bar {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
  }

  .rarity-legendary { background: linear-gradient(90deg, #f0a500, #ff6b00); }
  .rarity-epic { background: linear-gradient(90deg, #8b45e8, #c044f0); }
  .rarity-rare { background: linear-gradient(90deg, #1a6ef0, #44aaff); }
  .rarity-uncommon { background: linear-gradient(90deg, #18a855, #44d480); }
  .rarity-common { background: linear-gradient(90deg, #666, #999); }

  .item-icon { font-size: 22px; margin-bottom: 8px; }

  .item-name {
    font-family: 'Rajdhani', sans-serif;
    font-size: 12px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 4px;
  }

  .item-type {
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .item-rarity-text {
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .rarity-legendary .item-rarity-text, .text-legendary { color: #f0a500; }
  .text-epic { color: #c044f0; }
  .text-rare { color: #44aaff; }
  .text-uncommon { color: #44d480; }
  .text-common { color: #888; }

  /* BATTLE PASS */
  .bp-info {
    background: var(--panel2);
    border: 1px solid var(--border);
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 20px;
    margin-bottom: 24px;
  }

  .bp-icon { font-size: 28px; }

  .bp-details { flex: 1; }

  .bp-name {
    font-family: 'Orbitron', monospace;
    font-size: 13px;
    color: var(--gold);
    margin-bottom: 4px;
  }

  .bp-tier-bar {
    height: 4px;
    background: var(--border);
    border-radius: 0;
    margin: 6px 0;
    overflow: hidden;
  }

  .bp-tier-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--orange), var(--gold));
  }

  .bp-tier-text {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 1px;
  }

  .bp-credits {
    text-align: right;
  }

  .bp-credits-val {
    font-family: 'Orbitron', monospace;
    font-size: 16px;
    color: var(--cyan);
    font-weight: 700;
  }

  .bp-credits-label {
    font-size: 9px;
    color: var(--muted);
    font-family: 'Share Tech Mono', monospace;
    letter-spacing: 1px;
  }

  /* Rank display */
  .rank-display {
    display: flex;
    align-items: center;
    gap: 20px;
    background: var(--panel2);
    border: 1px solid var(--border);
    padding: 16px 20px;
    margin-bottom: 24px;
  }

  .rank-icon-big { font-size: 40px; }

  .rank-details { flex: 1; }

  .rank-name {
    font-family: 'Orbitron', monospace;
    font-size: 16px;
    font-weight: 700;
    margin-bottom: 4px;
  }

  .rank-mmr {
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 2px;
  }

  .rank-season {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 1px;
  }

  .rank-wr {
    text-align: right;
  }

  .rank-wr-val {
    font-family: 'Orbitron', monospace;
    font-size: 20px;
    font-weight: 700;
    color: var(--green);
  }

  .rank-wr-label {
    font-size: 9px;
    color: var(--muted);
    font-family: 'Share Tech Mono', monospace;
    letter-spacing: 1px;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); }

  /* Animations */
  .profile-card {
    animation: fadeUp 0.4s ease both;
  }

  .profile-card:nth-child(1) { animation-delay: 0.05s; }
  .profile-card:nth-child(2) { animation-delay: 0.1s; }
  .profile-card:nth-child(3) { animation-delay: 0.15s; }
  .profile-card:nth-child(4) { animation-delay: 0.2s; }
  .profile-card:nth-child(5) { animation-delay: 0.25s; }
  .profile-card:nth-child(6) { animation-delay: 0.3s; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .pulse-dot {
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--green);
    animation: pulse 2s infinite;
    margin-right: 6px;
    vertical-align: middle;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; box-shadow: 0 0 4px var(--green); }
    50% { opacity: 0.5; box-shadow: none; }
  }

  .offline-dot {
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--muted);
    margin-right: 6px;
    vertical-align: middle;
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="siege-logo">
      <div class="logo-hex">
        <svg viewBox="0 0 48 48" fill="none">
          <polygon points="24,2 44,13 44,35 24,46 4,35 4,13" fill="none" stroke="#e8700a" stroke-width="2"/>
          <polygon points="24,8 38,16 38,32 24,40 10,32 10,16" fill="rgba(232,112,10,0.08)"/>
          <text x="24" y="30" text-anchor="middle" font-family="Orbitron" font-size="16" font-weight="900" fill="#e8700a">R6</text>
        </svg>
      </div>
      <div class="logo-text">
        <div class="r6">RAINBOW SIX</div>
        <div class="siege">SIEGE</div>
      </div>
    </div>
    <div class="header-divider"></div>
    <div class="header-title">// OPERATOR PROFILES //</div>
    <div class="header-stats">

function getRankColor(rank) {
  const colors = {
    'Champion': '#f0a500',
    'Diamond': '#5bb8f5',
    'Platinum': '#a8c8e8',
    'Gold': '#e8b84b',
    'Silver': '#a8b8c8',
    'Bronze': '#b07040',
  };
  return colors[rank] || '#888';
}

function getRarityClass(rarity) {
  return `rarity-${rarity}`;
}

function getRarityText(rarity) {
  return `text-${rarity}`;
}

function buildCard(acc) {
  const isOnline = acc.status === 'online';
  const dot = isOnline
    ? `<span class="pulse-dot"></span>`
    : `<span class="offline-dot"></span>`;

  return `
  <div class="profile-card" onclick="openModal('${acc.id}')">
    <div class="card-corner"></div>
    <div class="card-inner">
      <div class="avatar-wrap">
        <div class="avatar">
          <div class="avatar-bg" style="background:${acc.avatarBg}"></div>
          <span class="avatar-emoji">${acc.avatar}</span>
        </div>
        <div class="rank-badge" style="background:${getRankColor(acc.rank)}22; color:${getRankColor(acc.rank)}; border-color: ${getRankColor(acc.rank)}55">
          ${acc.level < 100 ? acc.level : '●'}
        </div>
      </div>
      <div class="card-info">
        <div class="card-username">${acc.username}</div>
        <div class="card-uid">${acc.id}</div>
        <div class="card-tags">
          <span class="tag tag-platform">${acc.platform}</span>
          <span class="tag tag-region">${acc.region}</span>
          <span class="tag tag-status-${acc.status}">${dot}${acc.status.toUpperCase()}</span>
        </div>
        <div class="card-metrics">
          <div class="metric">
            <div class="m-label">RANK</div>
            <div class="m-val" style="color:${getRankColor(acc.rank)}">${acc.rank.toUpperCase()}</div>
          </div>
          <div class="metric">
            <div class="m-label">K/D</div>
            <div class="m-val" style="color:#d4dde6">${acc.kd}</div>
          </div>
          <div class="metric">
            <div class="m-label">LVL</div>
            <div class="m-val" style="color:var(--orange)">${acc.level}</div>
          </div>
        </div>
      </div>
    </div>
    <div class="card-value-bar">
      <div>
        <div class="value-label">ACCOUNT VALUE</div>
        <div class="value-items">${acc.totalItems} items</div>
      </div>
      <div class="value-amount">${acc.accountValue}</div>
    </div>
  </div>`;
}

function buildModal(acc) {
  const isOnline = acc.status === 'online';
  const bp = acc.seasonPass;
  const bpPct = Math.round((bp.tier / bp.maxTier) * 100);

  const operatorsHTML = acc.operators.map(op => `
    <div class="op-card">
      <div class="op-icon">${op.icon}</div>
      <div class="op-name">${op.name}</div>
      ${op.elite ? `<div class="op-elite">★ ELITE</div>` : `<div class="op-base">BASE</div>`}
    </div>
  `).join('');

  const itemsHTML = acc.items.map(item => `
    <div class="item-card">
      <div class="item-rarity-bar ${getRarityClass(item.rarity)}"></div>
      <div class="item-icon">${item.icon}</div>
      <div class="item-name">${item.name}</div>
      <div class="item-type">${item.type}</div>
      <div class="item-rarity-text ${getRarityText(item.rarity)}">${item.rarity.toUpperCase()}</div>
    </div>
  `).join('');

  const dot = isOnline
    ? `<span class="pulse-dot"></span>`
    : `<span class="offline-dot"></span>`;

  return `
  <div class="modal-header">
    <div class="modal-avatar">
      <div class="modal-avatar-bg" style="background:${acc.avatarBg}"></div>
      <span class="modal-avatar-emoji">${acc.avatar}</span>
    </div>
    <div class="modal-title-block">
      <div class="modal-username">${acc.username}</div>
      <div class="modal-uid">${acc.id}</div>
      <div class="modal-tags">
        <span class="tag tag-platform">${acc.platform}</span>
        <span class="tag tag-region">${acc.region}</span>
        <span class="tag tag-status-${acc.status}">${dot}${acc.status.toUpperCase()}</span>
      </div>
    </div>
    <div class="modal-value-block">
      <div class="modal-value-label">ACCOUNT VALUE</div>
      <div class="modal-value-amt">${acc.accountValue}</div>
    </div>
  </div>
  <div class="modal-body">
    
    <div class="stats-grid">
      <div class="stat-box">
        <div class="stat-box-label">LEVEL</div>
        <div class="stat-box-val" style="color:var(--orange)">${acc.level}</div>
        <div class="stat-box-sub">${acc.hoursPlayed.toLocaleString()} HRS PLAYED</div>
      </div>
      <div class="stat-box">
        <div class="stat-box-label">K/D RATIO</div>
        <div class="stat-box-val" style="color:${parseFloat(acc.kd) >= 1.5 ? 'var(--green)' : parseFloat(acc.kd) >= 1.0 ? 'var(--gold)' : 'var(--red)'}">${acc.kd}</div>
        <div class="stat-box-sub">WIN RATE ${acc.winrate}</div>
      </div>
      <div class="stat-box">
        <div class="stat-box-label">RENOWN</div>
        <div class="stat-box-val" style="color:var(--cyan)">${acc.renownCredits.toLocaleString()}</div>
        <div class="stat-box-sub">R6 CREDITS: ${acc.rCredits.toLocaleString()}</div>
      </div>
      <div class="stat-box">
        <div class="stat-box-label">ITEMS OWNED</div>
        <div class="stat-box-val">${acc.totalItems}</div>
        <div class="stat-box-sub">${acc.operators.length} OPERATORS</div>
      </div>
    </div>

    <div class="modal-section-title">RANKED STATUS</div>
    <div class="rank-display">
      <div class="rank-icon-big">${acc.rankIcon}</div>
      <div class="rank-details">
        <div class="rank-name" style="color:${getRankColor(acc.rank)}">${acc.rank}</div>
        <div class="rank-mmr">${acc.rankMMR} MMR</div>
        <div class="rank-season">CURRENT SEASON</div>
      </div>
      <div class="rank-wr">
        <div class="rank-wr-val">${acc.winrate}</div>
        <div class="rank-wr-label">WIN RATE</div>
      </div>
    </div>

    <div class="modal-section-title">SEASON PASS</div>
    <div class="bp-info">
      <div class="bp-icon">📦</div>
      <div class="bp-details">
        <div class="bp-name">${bp.name}</div>
        <div class="bp-tier-bar">
          <div class="bp-tier-fill" style="width:${bpPct}%"></div>
        </div>
        <div class="bp-tier-text">TIER ${bp.tier} / ${bp.maxTier} — ${bpPct}% COMPLETE</div>
      </div>
      <div class="bp-credits">
        <div class="bp-credits-val">${bp.credits.toLocaleString()}</div>
        <div class="bp-credits-label">BONUS CREDITS</div>
      </div>
    </div>

    <div class="modal-section-title">OPERATORS (${acc.operators.length})</div>
    <div class="operators-grid">${operatorsHTML}</div>

    <div class="modal-section-title">COSMETICS & ITEMS (${acc.items.length})</div>
    <div class="items-grid">${itemsHTML}</div>

  </div>`;
}

// RENDER CARDS
const grid = document.getElementById('profilesGrid');
accounts.forEach(acc => {
  grid.innerHTML += buildCard(acc);
});

// MODAL LOGIC
const overlay = document.getElementById('modalOverlay');
const modalContent = document.getElementById('modalContent');

function openModal(id) {
  const acc = accounts.find(a => a.id === id);
  if (!acc) return;
  modalContent.innerHTML = buildModal(acc);
  overlay.classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  overlay.classList.remove('active');
  document.body.style.overflow = '';
}

document.getElementById('closeBtn').addEventListener('click', closeModal);
overlay.addEventListener('click', e => {
  if (e.target === overlay) closeModal();
});

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});
</script>
