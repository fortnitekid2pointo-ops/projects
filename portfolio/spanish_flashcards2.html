<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spanish Vocab Flashcards</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Mono:wght@300;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0d0f;
    --card-bg: #141418;
    --card-front: #1a1a22;
    --card-back: #12201a;
    --gold: #c9a84c;
    --gold-dim: #7a6030;
    --green: #4caf82;
    --text: #e8e4d9;
    --muted: #6b6860;
    --border: rgba(201,168,76,0.18);
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1rem 4rem;
    position: relative;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    top: -40%;
    left: -20%;
    width: 80vw;
    height: 80vw;
    background: radial-gradient(circle, rgba(201,168,76,0.04) 0%, transparent 70%);
    pointer-events: none;
  }

  header {
    text-align: center;
    margin-bottom: 2.5rem;
    animation: fadeDown 0.6s ease both;
  }

  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2rem, 5vw, 3.2rem);
    font-weight: 700;
    letter-spacing: -0.01em;
    color: var(--gold);
    line-height: 1.1;
  }

  header p {
    color: var(--muted);
    font-size: 0.75rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-top: 0.5rem;
  }

  .controls {
    display: flex;
    gap: 0.75rem;
    margin-bottom: 2rem;
    flex-wrap: wrap;
    justify-content: center;
    animation: fadeDown 0.6s 0.1s ease both;
  }

  .controls button {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--gold);
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 0.55rem 1.1rem;
    cursor: pointer;
    transition: all 0.2s;
  }

  .controls button:hover {
    background: rgba(201,168,76,0.08);
    border-color: var(--gold);
  }

  .controls button.active {
    background: var(--gold);
    color: var(--bg);
    border-color: var(--gold);
  }

  /* Progress bar */
  .progress-wrap {
    width: 100%;
    max-width: 560px;
    margin-bottom: 1.5rem;
    animation: fadeDown 0.6s 0.15s ease both;
  }

  .progress-labels {
    display: flex;
    justify-content: space-between;
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 0.4rem;
  }

  .progress-bar {
    height: 3px;
    background: rgba(255,255,255,0.06);
    position: relative;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--gold-dim), var(--gold));
    transition: width 0.4s ease;
  }

  /* Card stage */
  .card-stage {
    width: 100%;
    max-width: 560px;
    perspective: 1200px;
    margin-bottom: 1.75rem;
    animation: fadeUp 0.5s 0.2s ease both;
  }

  .card-inner {
    position: relative;
    width: 100%;
    height: 280px;
    transform-style: preserve-3d;
    transition: transform 0.55s cubic-bezier(0.4, 0, 0.2, 1);
    cursor: pointer;
  }

  .card-inner.flipped {
    transform: rotateY(180deg);
  }

  .card-face {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    border: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    gap: 0.75rem;
  }

  .card-front {
    background: var(--card-front);
  }

  .card-back {
    background: var(--card-back);
    transform: rotateY(180deg);
    border-color: rgba(76,175,130,0.2);
  }

  .card-label {
    font-size: 0.62rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .card-front .card-label { color: var(--gold-dim); }
  .card-back .card-label { color: rgba(76,175,130,0.5); }

  .card-word {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2rem, 6vw, 3rem);
    font-weight: 700;
    text-align: center;
    line-height: 1.1;
  }

  .card-front .card-word { color: var(--text); }
  .card-back .card-word { color: var(--green); }

  .card-hint {
    font-size: 0.7rem;
    color: var(--muted);
    font-style: italic;
    text-align: center;
  }

  .card-corner {
    position: absolute;
    top: 1rem;
    right: 1.2rem;
    font-size: 0.6rem;
    color: var(--muted);
    letter-spacing: 0.08em;
  }

  .tap-hint {
    font-size: 0.6rem;
    color: var(--muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    text-align: center;
    margin-bottom: 1.25rem;
    opacity: 0.6;
  }

  /* Navigation */
  .nav {
    display: flex;
    align-items: center;
    gap: 1.25rem;
    margin-bottom: 2rem;
    animation: fadeUp 0.5s 0.25s ease both;
  }

  .nav button {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--gold);
    font-family: 'DM Mono', monospace;
    font-size: 1.1rem;
    width: 44px;
    height: 44px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .nav button:hover:not(:disabled) {
    background: rgba(201,168,76,0.1);
    border-color: var(--gold);
  }

  .nav button:disabled {
    opacity: 0.25;
    cursor: not-allowed;
  }

  .nav-count {
    font-size: 0.75rem;
    color: var(--muted);
    letter-spacing: 0.1em;
    min-width: 70px;
    text-align: center;
  }

  /* Grade buttons */
  .grade-row {
    display: flex;
    gap: 0.6rem;
    justify-content: center;
    margin-bottom: 2.5rem;
    flex-wrap: wrap;
    animation: fadeUp 0.5s 0.3s ease both;
  }

  .grade-row label {
    font-size: 0.6rem;
    color: var(--muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    width: 100%;
    text-align: center;
    margin-bottom: 0.25rem;
  }

  .grade-btn {
    border: 1px solid;
    background: transparent;
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 0.5rem 1rem;
    cursor: pointer;
    transition: all 0.2s;
  }

  .grade-btn.wrong  { border-color: rgba(220,80,80,0.4); color: #dc5050; }
  .grade-btn.hard   { border-color: rgba(220,140,50,0.4); color: #dc8c32; }
  .grade-btn.good   { border-color: rgba(76,175,130,0.4); color: var(--green); }
  .grade-btn.easy   { border-color: rgba(100,180,255,0.4); color: #64b4ff; }

  .grade-btn.wrong:hover  { background: rgba(220,80,80,0.1); }
  .grade-btn.hard:hover   { background: rgba(220,140,50,0.1); }
  .grade-btn.good:hover   { background: rgba(76,175,130,0.1); }
  .grade-btn.easy:hover   { background: rgba(100,180,255,0.1); }

  /* Word list */
  .word-list-section {
    width: 100%;
    max-width: 560px;
    animation: fadeUp 0.5s 0.35s ease both;
  }

  .word-list-section h2 {
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    color: var(--gold);
    margin-bottom: 1rem;
    padding-bottom: 0.5rem;
    border-bottom: 1px solid var(--border);
  }

  .word-list {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 0.5rem;
  }

  .word-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0.55rem 0.85rem;
    border: 1px solid transparent;
    cursor: pointer;
    transition: all 0.15s;
    font-size: 0.72rem;
  }

  .word-item:hover {
    border-color: var(--border);
    background: rgba(255,255,255,0.02);
  }

  .word-item.active {
    border-color: var(--gold-dim);
    background: rgba(201,168,76,0.06);
  }

  .word-item .es { color: var(--text); }
  .word-item .en { color: var(--muted); font-style: italic; }

  .word-item .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--muted);
    flex-shrink: 0;
    margin-left: 0.5rem;
  }

  .word-item.status-wrong .dot  { background: #dc5050; }
  .word-item.status-hard .dot   { background: #dc8c32; }
  .word-item.status-good .dot   { background: var(--green); }
  .word-item.status-easy .dot   { background: #64b4ff; }

  /* Stats bar */
  .stats-bar {
    display: flex;
    gap: 1.5rem;
    justify-content: center;
    margin-bottom: 1.75rem;
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    flex-wrap: wrap;
    animation: fadeDown 0.5s 0.2s ease both;
  }

  .stats-bar span strong {
    color: var(--text);
    font-weight: 500;
  }

  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes cardPop {
    0%   { transform: scale(0.97); opacity: 0.7; }
    100% { transform: scale(1);    opacity: 1; }
  }

  .card-inner.popping { animation: cardPop 0.25s ease both; }
</style>
</head>
<body>

<header>
  <h1>Spanish Vocab</h1>
  <p>80-word test prep · flashcard deck</p>
</header>

<div class="controls">
  <button id="btn-all" class="active" onclick="setFilter('all')">All (80)</button>
  <button id="btn-wrong" onclick="setFilter('wrong')">Wrong</button>
  <button id="btn-hard" onclick="setFilter('hard')">Hard</button>
  <button id="btn-unseen" onclick="setFilter('unseen')">Unseen</button>
  <button onclick="shuffleDeck()">⇌ Shuffle</button>
</div>

<div class="stats-bar">
  <span>✗ Wrong: <strong id="stat-wrong">0</strong></span>
  <span>~ Hard: <strong id="stat-hard">0</strong></span>
  <span>✓ Good: <strong id="stat-good">0</strong></span>
  <span>★ Easy: <strong id="stat-easy">0</strong></span>
</div>

<div class="progress-wrap">
  <div class="progress-labels">
    <span>Progress</span>
    <span id="prog-label">0 / 80 graded</span>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
</div>

<div class="card-stage">
  <div class="card-inner" id="card" onclick="flipCard()">
    <div class="card-face card-front">
      <span class="card-label">Spanish</span>
      <div class="card-word" id="card-es">Palabra #1</div>
      <div class="card-hint" id="card-hint">[ category placeholder ]</div>
      <span class="card-corner" id="card-num">1 / 80</span>
    </div>
    <div class="card-face card-back">
      <span class="card-label">English</span>
      <div class="card-word" id="card-en">Word #1</div>
      <div class="card-hint" id="card-hint-back">example sentence placeholder</div>
      <span class="card-corner">← back</span>
    </div>
  </div>
</div>

<p class="tap-hint">Tap card to flip · grade yourself below</p>

<div class="grade-row">
  <label>How well did you know it?</label>
  <button class="grade-btn wrong" onclick="grade('wrong')">✗ Wrong</button>
  <button class="grade-btn hard"  onclick="grade('hard')">~ Hard</button>
  <button class="grade-btn good"  onclick="grade('good')">✓ Good</button>
  <button class="grade-btn easy"  onclick="grade('easy')">★ Easy</button>
</div>

<div class="nav">
  <button id="btn-prev" onclick="navigate(-1)" disabled>←</button>
  <span class="nav-count" id="nav-label">1 of 80</span>
  <button id="btn-next" onclick="navigate(1)">→</button>
</div>

<div class="word-list-section">
  <h2>All Words</h2>
  <div class="word-list" id="word-list"></div>
</div>

<script>
// ─── DATA: Replace placeholders with your 80 words ───────────────────────────
// Format: { es: "Spanish word", en: "English meaning", hint: "category/note" }
const ALL_WORDS = Array.from({ length: 80 }, (_, i) => ({
  es: `Palabra ${i + 1}`,
  en: `Word ${i + 1}`,
  hint: `Category ${Math.ceil((i + 1) / 10)}`
}));
// ─────────────────────────────────────────────────────────────────────────────

let deck = [...ALL_WORDS];
let currentIndex = 0;
let isFlipped = false;
let statusMap = {}; // index in ALL_WORDS → 'wrong'|'hard'|'good'|'easy'
let filter = 'all';
let filteredDeck = [];
let originalIndices = [];

function buildFilteredDeck() {
  filteredDeck = [];
  originalIndices = [];
  ALL_WORDS.forEach((w, i) => {
    const s = statusMap[i];
    if (filter === 'all')    { filteredDeck.push(w); originalIndices.push(i); }
    else if (filter === 'wrong'  && s === 'wrong')  { filteredDeck.push(w); originalIndices.push(i); }
    else if (filter === 'hard'   && s === 'hard')   { filteredDeck.push(w); originalIndices.push(i); }
    else if (filter === 'unseen' && !s)             { filteredDeck.push(w); originalIndices.push(i); }
  });
  currentIndex = 0;
}

function setFilter(f) {
  filter = f;
  ['all','wrong','hard','unseen'].forEach(x => document.getElementById('btn-'+x)?.classList.remove('active'));
  document.getElementById('btn-'+f)?.classList.add('active');
  buildFilteredDeck();
  renderCard();
  renderList();
}

function shuffleDeck() {
  for (let i = filteredDeck.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [filteredDeck[i], filteredDeck[j]] = [filteredDeck[j], filteredDeck[i]];
    [originalIndices[i], originalIndices[j]] = [originalIndices[j], originalIndices[i]];
  }
  currentIndex = 0;
  renderCard();
}

function flipCard() {
  isFlipped = !isFlipped;
  document.getElementById('card').classList.toggle('flipped', isFlipped);
}

function navigate(dir) {
  currentIndex = Math.max(0, Math.min(filteredDeck.length - 1, currentIndex + dir));
  isFlipped = false;
  const card = document.getElementById('card');
  card.classList.remove('flipped', 'popping');
  void card.offsetWidth; // force reflow
  card.classList.add('popping');
  card.addEventListener('animationend', () => card.classList.remove('popping'), { once: true });
  renderCard();
}

function grade(status) {
  const origIdx = originalIndices[currentIndex];
  if (origIdx !== undefined) statusMap[origIdx] = status;
  updateStats();
  renderList();
  renderProgress();
  if (currentIndex < filteredDeck.length - 1) {
    setTimeout(() => navigate(1), 200);
  }
}

function renderCard() {
  const w = filteredDeck[currentIndex];
  if (!w) {
    document.getElementById('card-es').textContent = '—';
    document.getElementById('card-en').textContent = 'No cards';
    document.getElementById('card-hint').textContent = '';
    document.getElementById('card-hint-back').textContent = '';
    document.getElementById('card-num').textContent = '0 / 0';
    document.getElementById('nav-label').textContent = '0 of 0';
    return;
  }
  document.getElementById('card-es').textContent = w.es;
  document.getElementById('card-en').textContent = w.en;
  document.getElementById('card-hint').textContent = w.hint || '';
  document.getElementById('card-hint-back').textContent = w.hint || '';
  document.getElementById('card-num').textContent = `${currentIndex + 1} / ${filteredDeck.length}`;
  document.getElementById('nav-label').textContent = `${currentIndex + 1} of ${filteredDeck.length}`;
  document.getElementById('btn-prev').disabled = currentIndex === 0;
  document.getElementById('btn-next').disabled = currentIndex === filteredDeck.length - 1;

  // Highlight in list
  document.querySelectorAll('.word-item').forEach((el, i) => {
    el.classList.toggle('active', i === originalIndices[currentIndex]);
  });
}

function updateStats() {
  const counts = { wrong: 0, hard: 0, good: 0, easy: 0 };
  Object.values(statusMap).forEach(s => { if (counts[s] !== undefined) counts[s]++; });
  document.getElementById('stat-wrong').textContent = counts.wrong;
  document.getElementById('stat-hard').textContent  = counts.hard;
  document.getElementById('stat-good').textContent  = counts.good;
  document.getElementById('stat-easy').textContent  = counts.easy;
}

function renderProgress() {
  const graded = Object.keys(statusMap).length;
  const pct = Math.round((graded / ALL_WORDS.length) * 100);
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('prog-label').textContent = `${graded} / ${ALL_WORDS.length} graded`;
}

function renderList() {
  const list = document.getElementById('word-list');
  list.innerHTML = '';
  ALL_WORDS.forEach((w, i) => {
    const div = document.createElement('div');
    div.className = 'word-item' + (statusMap[i] ? ` status-${statusMap[i]}` : '');
    if (i === originalIndices[currentIndex]) div.classList.add('active');
    div.innerHTML = `<span class="es">${w.es}</span><span class="en">${w.en}</span><span class="dot"></span>`;
    div.onclick = () => {
      // Jump to this card in the deck
      const pos = originalIndices.indexOf(i);
      if (pos !== -1) { currentIndex = pos; isFlipped = false; document.getElementById('card').classList.remove('flipped'); renderCard(); }
    };
    list.appendChild(div);
  });
}

// Init
buildFilteredDeck();
renderCard();
renderList();
updateStats();
renderProgress();
</script>
</body>
</html>
